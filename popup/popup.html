<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup">
    <div class="head">
      <h2>GET MY TIME</h2>
      <span class="jp">時刻換算</span>
    </div>

    <div class="row time-row">
      <div class="head-line">
        <span class="key">&rarr; Enter time</span>
        <span class="hint">e.g. 10:30 PM</span>
      </div>
      <div class="input-line">
        <input type="text" id="timeInput" placeholder="10:30 PM" autofocus autocomplete="off" />
        <span class="caret" aria-hidden="true"></span>
      </div>
    </div>

    <div class="row">
      <span class="key">From</span>
      <span class="leader" aria-hidden="true"></span>
      <select id="fromZone" class="val"></select>
    </div>

    <button id="swapBtn" class="swap" aria-label="Swap zones">&#x21CB; swap</button>

    <div class="row">
      <span class="key">To</span>
      <span class="leader" aria-hidden="true"></span>
      <select id="toZone" class="val"></select>
    </div>

    <button id="convertBtn" class="cta">Convert <span aria-hidden="true">&rarr;</span></button>

    <section id="result" class="result" hidden aria-live="polite">
      <div class="result-top">
        <div class="result-time" id="resultTime"></div>
        <div class="stamp" id="resultStamp" hidden></div>
      </div>
      <div class="meta-stub">
        <div><div class="m-label">Day</div><div class="m-val" id="resultDay">&mdash;</div></div>
        <div><div class="m-label">Date</div><div class="m-val" id="resultDate">&mdash;</div></div>
        <div><div class="m-label">Zone</div><div class="m-val" id="resultZone">&mdash;</div></div>
      </div>
    </section>

    <div class="footer">
      <span>GMT &middot; v3</span>
      <span id="footerStamp"></span>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
