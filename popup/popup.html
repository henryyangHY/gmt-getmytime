<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="board">
    <header class="masthead">
      <div class="wordmark">
        <span class="wm-prefix">TZ</span><span class="wm-dot">·</span><span class="wm-suffix">CONVERT</span>
      </div>
      <div class="tagline">A schedule utility &mdash; <em>since you keep asking</em></div>
    </header>

    <div class="entry">
      <span class="entry-key">Time</span>
      <span class="entry-leader" aria-hidden="true"></span>
      <input type="text" id="timeInput" class="entry-val" placeholder="10:30 PM" autofocus autocomplete="off">
    </div>

    <div class="entry">
      <span class="entry-key">From</span>
      <span class="entry-leader" aria-hidden="true"></span>
      <select id="fromZone" class="entry-val"></select>
    </div>

    <button id="swapBtn" class="swap" title="Swap zones" aria-label="Swap zones">
      <span aria-hidden="true">&#x2195;</span> swap
    </button>

    <div class="entry">
      <span class="entry-key">To</span>
      <span class="entry-leader" aria-hidden="true"></span>
      <select id="toZone" class="entry-val"></select>
    </div>

    <button id="convertBtn" class="convert">
      Convert <span class="arrow" aria-hidden="true">&rarr;</span>
    </button>

    <section id="result" class="board-result" hidden aria-live="polite">
      <div class="result-header">
        <span class="result-tag">Arriving</span>
        <span class="result-leader" aria-hidden="true"></span>
        <span class="result-meta" id="resultMeta"></span>
      </div>
      <div class="result-time" id="resultTime"></div>
      <div class="result-note" id="resultNote"></div>
    </section>

    <footer class="footer">
      <span class="footer-mark">GMT &middot; v3</span>
      <span class="footer-flight" id="footerStamp"></span>
    </footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
